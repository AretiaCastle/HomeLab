services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    network_mode: "host"
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '10081:81'
    volumes:
      - data:/data
      - letsencrypt:/etc/letsencrypt

volumes:
  data_backup:
    driver: local
      driver_opts:
        type: none
        o: bind
        device: /mnt/docker_volumes/ingress/data
  letsencrypt_backup:
    driver: local
      driver_opts:
        type: none
        o: bind
        device: /mnt/docker_volumes/ingress/letsencrypt