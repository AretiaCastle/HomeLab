services:
  fireflyiii_core:
    image: fireflyiii/core:latest
    hostname: fireflyiii_core
    container_name: fireflyiii_core
    restart: always
    ports:
      - "$FIREFLYIII_WEB_INTERFACE_PORT:8080"
    volumes:
      - fireflyiii_upload:/var/www/html/storage/upload
    networks:
      - ingress
    depends_on:
      - fireflyiii_db

  fireflyiii_db:
    image: mariadb:lts
    hostname: fireflyiii_db
    container_name: fireflyiii_db
    restart: always
    env_file: .db.env
    volumes:
      - fireflyiii_db:/var/lib/mysql
    networks:
      - ingress

  fireflyiii_cron:
    #
    # To make this work, set STATIC_CRON_TOKEN in your .env file or as an environment variable
    # The STATIC_CRON_TOKEN must be *exactly* 32 characters long
    #
    image: alpine
    restart: always
    container_name: fireflyiii_cron
    env_file: .env
    command: sh -c "
      apk add tzdata && \
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- http://app:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\"
      | crontab - && \
      crond -f -L /dev/stdout"
    networks:
      - ingress
    depends_on:
      - fireflyiii_core

volumes:
  fireflyiii_upload:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "$FIREFLYIII_UPLOAD_PATH"
  fireflyiii_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "$FIREFLYIII_DB_PATH"

networks:
  ingress:
    external: true
