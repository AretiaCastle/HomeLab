services:
  wgdashboard:
    image: ghcr.io/wgdashboard/wgdashboard:latest
    restart: unless-stopped
    container_name: wgdashboard

    ports:
      # Web interface port
      - "${WGDASHBOARD_DOCKER_WEB_INTERFACE_PORT}:${WGDASHBOARD_DOCKER_WEB_INTERFACE_PORT}/tcp"
      # VPN connection port
      - "${WGDASHBOARD_DOCKER_VPN_PORT}:${WGDASHBOARD_DOCKER_VPN_PORT}/udp"

    volumes:
      - aconf:/etc/amnezia/amneziawg
      - conf:/etc/wireguard
      - data:/data

    cap_add:
      - NET_ADMIN

volumes:
  aconf:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${WGDASHBOARD_DOCKER_ACONF_VOLUME_PATH}"
  conf:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${WGDASHBOARD_DOCKER_CONF_VOLUME_PATH}"
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${WGDASHBOARD_DOCKER_DATA_VOLUME_PATH}"
