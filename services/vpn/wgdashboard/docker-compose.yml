services:
  wgdashboard:
    image: ghcr.io/wgdashboard/wgdashboard:latest
    restart: unless-stopped
    container_name: wgdashboard

    ports:
      - "${WGDASHBOARD_WEB_INTERFACE_PORT}:${WGDASHBOARD_WEB_INTERFACE_PORT}/tcp"
      - "${WGDASHBOARD_VPN_PORT}:${WGDASHBOARD_VPN_PORT}/udp"

    volumes:
      - aconf:/etc/amnezia/amneziawg
      - conf:/etc/wireguard
      - data:/data

    cap_add:
      - NET_ADMIN

volumes:
  aconf:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${WGDASHBOARD_ACONF_VOLUME_PATH}"
  conf:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${WGDASHBOARD_CONF_VOLUME_PATH}"
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${WGDASHBOARD_DATA_VOLUME_PATH}"
