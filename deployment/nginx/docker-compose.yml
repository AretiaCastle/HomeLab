services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '10081:81'
    volumes:
      - data:/data
      - letsencrypt:/etc/letsencrypt

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/docker_volumes/ingress/nginx/data
  letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/docker_volumes/ingress/nginx/letsencrypt

networks:
  ingress:
    external: true
